<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Login - igniteFIT</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Fonte -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      background:#07111f;
      overflow-x:hidden;
      position:relative;
      color:white;
    }

    /* FUNDO */
    body::before{
      content:"";
      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background-image:url("img/logo-ignitefit.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:500px;

      filter:blur(10px);

      opacity:0.10;

      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:linear-gradient(
        180deg,
        rgba(5,10,20,0.92),
        rgba(10,20,40,0.95)
      );

      z-index:-1;
    }

    /* NAVBAR */
    .navbar{
      background:#050b16 !important;
      border-bottom:2px solid #1e90ff;
    }

    .navbar-brand,
    .nav-link{
      color:white !important;
      font-weight:500;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#1e90ff !important;
    }

    /* LOGIN */
    .area-login{
      min-height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .container-login{
      width:100%;
      max-width:450px;

      background:rgba(11,23,40,0.9);

      border:1px solid rgba(30,144,255,0.3);

      padding:40px;

      border-radius:25px;

      backdrop-filter:blur(10px);

      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    .container-login h1{
      text-align:center;
      margin-bottom:30px;

      color:#3da5ff;

      font-weight:700;

      text-shadow:0 0 10px rgba(30,144,255,0.5);
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;

      color:#dbeafe;

      font-weight:500;
    }

    .input-box input{
      width:100%;

      padding:14px;

      border:none;

      border-radius:12px;

      outline:none;

      background:#122033;

      color:white;

      transition:0.3s;
    }

    .input-box input:focus{
      border:1px solid #1e90ff;

      box-shadow:0 0 12px rgba(30,144,255,0.4);
    }

    .input-box input::placeholder{
      color:#9ca3af;
    }

    /* BOTÃO */
    .btn-login{
      width:100%;

      padding:14px;

      border:none;

      border-radius:12px;

      background:#1e90ff;

      color:white;

      font-size:16px;

      font-weight:600;

      cursor:pointer;

      transition:0.3s;
    }

    .btn-login:hover{
      background:#0066d6;

      transform:translateY(-2px);

      box-shadow:0 0 15px rgba(30,144,255,0.5);
    }

    /* LINKS */
    .links{
      margin-top:20px;
      text-align:center;
      color:#d1d5db;
    }

    .links a{
      text-decoration:none;
      color:#3da5ff;
      font-weight:600;
    }

    .links a:hover{
      color:#60b6ff;
    }

    /* RESPONSIVO */
    @media(max-width:768px){

      .container-login{
        padding:30px 25px;
      }

      body::before{
        background-size:250px;
      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

      <a class="navbar-brand d-flex align-items-center"
         href="index.html">

        <img src="img/logo-ignitefit.png"
             width="45"
             class="me-2"
             alt="">

        igniteFIT

      </a>

      <button class="navbar-toggler bg-light"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse"
           id="navbarSupportedContent">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link"
               href="index.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               href="Produtos.html">
              Produtos
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               href="contato.html">
              Contato
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active"
               href="login.html">
              Cadastro/Login
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- LOGIN -->
  <section class="area-login">

    <div class="container-login">

      <h1>
        Login
      </h1>

      <form>

        <div class="input-box">

          <label>
            E-mail
          </label>

          <input type="email"
                 placeholder="Digite seu e-mail"
                 required>

        </div>

        <div class="input-box">

          <label>
            Senha
          </label>

          <input type="password"
                 placeholder="Digite sua senha"
                 required>

        </div>

        <button type="submit"
                class="btn-login">

          Entrar

        </button>

        <div class="links">

          Não possui conta?

          <a href="cadastro.html">
            Cadastre-se
          </a>

        </div>

      </form>

    </div>

  </section>

</body>

</html>
